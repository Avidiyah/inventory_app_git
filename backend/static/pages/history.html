    <!-- =================== HISTORY PAGE =================== -->
    <div class="page" id="history-page">

        <section id="history-section">
            <h2>Transaction History</h2>

            <!-- Work-order overlay filter: visible on every sub-tab, composes
                 with item / user filters via AND. -->
            <div class="filter-row">
                <label for="history-wo-filter">Filter by Work Order</label>
                <input type="text" id="history-wo-filter" placeholder="Filter by work order number">
                <button id="history-wo-clear-btn" type="button" class="secondary-btn">Clear</button>
            </div>

            <!-- In-page sub-navigation (views/subnav.js): one feature panel
                 visible at a time. The shared #history-results table below sits
                 OUTSIDE these panels, so it stays visible across all three. -->
            <nav id="history-tabs" class="sub-nav" aria-label="History views">
                <button type="button" class="sub-nav-btn active" data-feature="all">All Transactions</button>
                <button type="button" class="sub-nav-btn" data-feature="item">By Item</button>
                <button type="button" class="sub-nav-btn" data-feature="user">By User</button>
            </nav>

            <!-- All Transactions feature -->
            <div class="feature-panel" id="history-all-panel" data-feature="all">
                <p class="hint">Every stock and dispense transaction, newest first.</p>
            </div>

            <!-- By Item feature -->
            <div class="feature-panel" id="history-item-panel" data-feature="item" hidden>
                <div class="filter-row">
                    <label for="history-item-barcode">Item Barcode</label>
                    <input type="text" id="history-item-barcode" placeholder="Enter barcode">
                    <button id="history-item-lookup-btn">Look Up</button>
                </div>
                <p id="history-item-message"></p>
            </div>

            <!-- By User feature -->
            <div class="feature-panel" id="history-user-panel" data-feature="user" hidden>
                <div class="filter-row">
                    <label for="history-user-select">User</label>
                    <select id="history-user-select">
                        <option value="" disabled selected>-- Select user --</option>
                    </select>
                </div>
                <p id="history-user-message"></p>
            </div>

            <!-- Shared results table -->
            <div id="history-results" hidden>
                <div class="history-results-toolbar">
                    <button id="history-pricing-btn" type="button" class="secondary-btn" disabled>Pricing list</button>
                    <p id="history-pricing-message"></p>
                </div>
                <textarea id="history-pricing-output" class="pricing-output" rows="12" wrap="off" readonly hidden aria-label="Pricing list"></textarea>
                <table id="history-table" class="stack-table">
                    <thead>
                        <tr>
                            <th>Timestamp</th>
                            <th>Item</th>
                            <th>Type</th>
                            <th>Quantity</th>
                            <th>Work Order</th>
                            <th>User</th>
                            <th class="admin-col" hidden>Charge</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="history-tbody"></tbody>
                </table>

                <div id="history-pagination" class="pagination">
                    <button id="history-prev-btn">&laquo; Prev</button>
                    <span id="history-page-info">Page 1 of 1</span>
                    <button id="history-next-btn">Next &raquo;</button>
                </div>
            </div>

        </section>

    </div>
