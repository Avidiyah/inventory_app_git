
    <!-- =================== TRANSACTION PAGE =================== -->
    <div class="page" id="transaction-page">

        <!-- Scan-and-go batch flow. Two states share this section:
             #wo-gate (enter a work order) then #scango-active (pick a
             direction + quantity, then scan items into the work order).
             Driven by views/transactions.js; see docs/current-state.md. -->
        <section id="txn-scango-section">
            <div id="wo-gate">
                <h2>Start a work order</h2>

                <!-- Cards-first surface (Supervisor+; revealed by
                     views/transactions.js). Saved work orders are mass-staging
                     rooms (building + room + work order); tapping one starts a
                     scan-and-go batch on that work order. "Add a new work order"
                     quick-adds building + room + WO (find-or-create the
                     building's active stage) and starts the batch -- it persists
                     as a card for next time. Scanning is a plain transaction on
                     the work order, NOT written back to the stage. See
                     docs/current-state.md. -->
                <div id="wo-gate-cards-section" hidden>
                    <p class="hint">Tap a saved work order to scan into it.</p>
                    <div id="wo-gate-cards"></div>
                    <p id="wo-gate-cards-message" class="hint"></p>

                    <details id="wo-gate-new">
                        <summary>Add a new work order</summary>
                        <div class="wo-gate-new-form">
                            <label for="wo-gate-new-building">Community</label>
                            <input type="text" id="wo-gate-new-building" placeholder="e.g. Scholars" autocomplete="off">
                            <label for="wo-gate-new-buildingno">Building Number</label>
                            <input type="text" id="wo-gate-new-buildingno" placeholder="e.g. 19" autocomplete="off">
                            <label for="wo-gate-new-room">Unit Number</label>
                            <input type="text" id="wo-gate-new-room" placeholder="e.g. 1121" autocomplete="off">
                            <label for="wo-gate-new-wo">Work order number</label>
                            <input type="text" id="wo-gate-new-wo" placeholder="Work order #" autocomplete="off" inputmode="text">
                            <label for="wo-gate-new-assignee">Assign to (optional)</label>
                            <select id="wo-gate-new-assignee">
                                <option value="">Unassigned</option>
                            </select>
                            <button type="button" id="wo-gate-new-save-btn">Save &amp; start</button>
                            <p id="wo-gate-new-message"></p>
                        </div>
                    </details>
                </div>

                <!-- Free-text gate: the Technician surface, and a Supervisor+
                     ad-hoc fallback for a one-off work order not tied to a
                     building/room. -->
                <div id="wo-gate-manual">
                    <label for="wo-gate-input">Work Order Number</label>
                    <input type="text" id="wo-gate-input" class="wo-gate-input" placeholder="Enter work order number" autocomplete="off" inputmode="text">
                    <button id="wo-gate-start-btn">Start</button>
                </div>

                <p id="wo-gate-message"></p>
            </div>

            <div id="scango-active" hidden>
                <div id="scango-wo-bar">
                    <span id="scango-wo-label"></span>
                    <button id="scango-change-wo-btn" type="button" class="secondary-btn">Change work order</button>
                </div>

                <!-- Opt-in for Supervisor+ only (hidden for Technicians and
                     until shown by views/transactions.js). By default
                     Supervisor+ get the streamlined dispense-only flow; this
                     reveals the direction toggle plus the "browse all items"
                     mode of the manual-entry panel below. -->
                <button type="button" id="scango-advanced-toggle" class="secondary-btn" hidden aria-expanded="false" aria-controls="txn-manual-section">Manual entry &amp; stock options</button>

                <p id="scango-summary" class="scango-summary" hidden></p>
                <div id="scango-log" class="scango-log" hidden></div>
            </div>
        </section>

        <section id="txn-scan-section" hidden>
            <h2>Scan item</h2>
            <p class="hint">Point your camera at a barcode, or upload a photo. Each scan is saved to the work order automatically.</p>
            <div class="scan-controls">
                <!-- File input is hidden via CSS; the Upload button
                     programmatically clicks it. Kept here so the
                     existing upload path in views/scan.js works
                     unchanged. -->
                <input type="file" id="txn-scan-input" accept="image/*" capture="environment">
                <div class="scan-viewport">
                    <video id="txn-scan-video" class="scan-video" playsinline muted autoplay></video>
                    <div id="txn-scan-aimbox" class="scan-aimbox" role="presentation" hidden></div>
                </div>
                <div class="scan-toolbar">
                    <button id="txn-scan-scan-btn" type="button">Scan Barcode</button>
                    <button id="txn-scan-upload-btn" type="button" class="secondary-btn">Upload Photo</button>
                    <button id="txn-scan-torch-btn" type="button" class="secondary-btn" hidden>Torch</button>
                </div>
            </div>

            <!-- Direction + quantity sit below the scan controls so the scan
                 button is the first thing shown after the work order. Supervisor+
                 get the segmented toggle; the hidden #scango-type carries the
                 submitted value. Technicians (and non-opted-in Supervisor+) see
                 the fixed #scango-direction-fixed instead. -->
            <input type="hidden" id="scango-type" value="dispense">
            <div id="scango-direction" class="segmented" role="group" aria-label="Transaction type">
                <button type="button" class="seg-btn scango-seg-stock" data-value="stock">Add Stock</button>
                <button type="button" class="seg-btn scango-seg-dispense active" data-value="dispense">Take Out Stock</button>
            </div>
            <p id="scango-direction-fixed" class="scango-fixed" hidden>Taking out stock</p>

            <label for="scango-quantity">Quantity</label>
            <input type="number" id="scango-quantity" class="scango-quantity" placeholder="1" min="0" step="any" inputmode="decimal" value="1">

            <div id="txn-scan-chooser" class="scan-chooser" hidden></div>
            <p id="txn-scan-message"></p>
        </section>

        <!-- Manual entry: find an item by name/barcode (or, for an
             opted-in Supervisor+, browse the full list) and tap a card to
             commit it straight into the active work order at the current
             quantity/direction above -- the same commit path a scan uses
             (views/transactions.js: commitScannedItem). Available to every
             role; this is the fallback for when scanning isn't practical,
             not a separate ad-hoc flow. -->
        <section id="txn-manual-section">
            <h2>Add item manually</h2>
            <input type="text" id="txn-item-search" class="manual-search-input" placeholder="Search by name or barcode" autocomplete="off">
            <div id="txn-item-search-results" class="manual-results" hidden></div>
        </section>

    </div>
