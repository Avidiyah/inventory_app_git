<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Scan Test (Phase 1 Spike)</title>
  <!--
    Phase 1 decoder spike. Not part of the SPA, not linked from the app
    UI, not authenticated. Exists to validate @zxing/browser on the
    actual phones and labels in use; deleted in the Phase 3 ship PR.
    See docs/plan-live-capture.md.

    Inline styles allowed *only* in this file -- scoped to the spike and
    isolated from the real frontend's no-inline-style convention.
  -->
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      margin: 0;
      padding: 0.5rem;
      color: #111;
      background: #f5f5f5;
    }
    h1 {
      font-size: 1.1rem;
      margin: 0 0 0.5rem 0;
    }
    .stage {
      position: relative;
      display: inline-block;
      max-width: 100%;
      background: #000;
    }
    #scan-test-video {
      display: block;
      max-width: 100%;
      max-height: 70vh;
      filter: grayscale(100%);
    }
    #scan-test-aimbox {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 80%;
      aspect-ratio: 3 / 1;
      transform: translate(-50%, -50%);
      border: 3px solid #ffd400;
      box-shadow: 0 0 0 1px #000 inset, 0 0 0 1px #000;
      pointer-events: none;
      box-sizing: border-box;
    }
    .controls {
      margin-top: 0.5rem;
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
    }
    .controls button {
      font-size: 1rem;
      padding: 0.6rem 0.9rem;
      border: 1px solid #444;
      background: #fff;
      border-radius: 4px;
      cursor: pointer;
    }
    .controls button:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }
    .diag {
      margin-top: 0.75rem;
      background: #fff;
      border: 1px solid #ccc;
      border-radius: 4px;
      padding: 0.5rem 0.75rem;
      font-size: 0.85rem;
    }
    .diag table {
      width: 100%;
      border-collapse: collapse;
    }
    .diag td {
      padding: 0.15rem 0.4rem;
      vertical-align: top;
    }
    .diag td:first-child {
      color: #555;
      width: 40%;
      white-space: nowrap;
    }
    .diag td:last-child {
      font-family: ui-monospace, Consolas, monospace;
      word-break: break-all;
    }
    #scan-test-log {
      margin-top: 0.5rem;
      background: #111;
      color: #ddd;
      font-family: ui-monospace, Consolas, monospace;
      font-size: 0.75rem;
      padding: 0.5rem;
      border-radius: 4px;
      max-height: 30vh;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-all;
    }
    .pill {
      display: inline-block;
      padding: 0.05rem 0.4rem;
      border-radius: 999px;
      background: #eee;
      font-size: 0.75rem;
      color: #333;
    }
    .pill.ok { background: #d2f7d2; color: #064; }
    .pill.warn { background: #fde7a8; color: #604; }
    .pill.err { background: #f7c8c8; color: #800; }
    label.field {
      display: inline-block;
      margin-right: 0.5rem;
      font-size: 0.85rem;
    }
    label.field input {
      font-size: 0.85rem;
      padding: 0.2rem 0.4rem;
    }
  </style>
</head>
<body>
  <h1>Phase 1 Decoder Spike</h1>

  <div class="stage">
    <video id="scan-test-video" playsinline muted autoplay></video>
    <div id="scan-test-aimbox" hidden></div>
  </div>

  <div class="controls">
    <button id="scan-test-start-btn" type="button">Start</button>
    <button id="scan-test-stop-btn" type="button" disabled>Stop</button>
    <button id="scan-test-reset-window-btn" type="button">Reset window</button>
    <button id="scan-test-torch-btn" type="button" hidden>Torch: off</button>
    <button id="scan-test-copy-logs-btn" type="button">Copy logs</button>
  </div>

  <div class="controls">
    <label class="field">
      Phone:
      <input id="scan-test-phone" type="text" placeholder="e.g. Pixel 6a" size="20">
    </label>
    <label class="field">
      Conditions:
      <input id="scan-test-conditions" type="text" placeholder="e.g. shop floor, fluorescent" size="30">
    </label>
  </div>

  <div class="diag">
    <table>
      <tbody id="scan-test-diag-rows">
        <tr><td>Camera state</td><td><span id="diag-state" class="pill">idle</span></td></tr>
        <tr><td>Resolution granted</td><td id="diag-resolution">—</td></tr>
        <tr><td>facingMode granted</td><td id="diag-facing">—</td></tr>
        <tr><td>Torch capability</td><td id="diag-torch">—</td></tr>
        <tr><td>FPS (decode callbacks)</td><td id="diag-fps">—</td></tr>
        <tr><td>Mean decode latency</td><td id="diag-latency">—</td></tr>
        <tr><td>Latest decoded</td><td id="diag-latest">—</td></tr>
        <tr><td>Rolling window (last 10)</td><td id="diag-window">—</td></tr>
        <tr><td>Accepted (≥5 of 10)</td><td id="diag-accepted">—</td></tr>
        <tr><td>Time Start → accepted</td><td id="diag-tta">—</td></tr>
      </tbody>
    </table>
  </div>

  <pre id="scan-test-log"></pre>

  <script src="/static/vendor/zxing-browser-0.2.0.umd.min.js"></script>
  <script type="module" src="/static/scan-test.js"></script>
</body>
</html>
